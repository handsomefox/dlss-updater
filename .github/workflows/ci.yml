name: CI

on:
  push:
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable:
    name: Portable checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup default 1.97.1
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Detect unused dependencies
        uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2

  windows:
    name: Windows checks
    permissions:
      contents: read
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup default 1.97.1
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo build --workspace --release --locked
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dlss-updater-windows-x86_64
          path: target/release/dlss-updater.exe
          if-no-files-found: error

  audit:
    name: RustSec audit
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal
          rustup default 1.97.1
      - name: Install Cargo Audit
        run: cargo install cargo-audit --version 0.22.2 --locked --no-default-features
      - run: cargo audit

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup default 1.97.1
      - name: Verify tag matches workspace version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq 'dlss-app').version
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Tag $env:RELEASE_TAG does not match workspace version v$version"
          }
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo build --workspace --release --locked
      - name: Package Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/dlss-updater.exe dist/dlss-updater.exe
          Remove-Item -Force -ErrorAction SilentlyContinue dist/dlss-updater-windows-x86_64.zip,dist/SHA256SUMS
          Compress-Archive -CompressionLevel Optimal -Path dist/dlss-updater.exe -DestinationPath dist/dlss-updater-windows-x86_64.zip
          @('dlss-updater.exe', 'dlss-updater-windows-x86_64.zip') | ForEach-Object {
            $hash = (Get-FileHash "dist/$_" -Algorithm SHA256).Hash.ToLower()
            "$hash  $_"
          } | Set-Content -Encoding ascii dist/SHA256SUMS
          @('dlss-updater.exe', 'SHA256SUMS', 'dlss-updater-windows-x86_64.zip') | ForEach-Object {
            if (-not (Test-Path "dist/$_")) { throw "Missing release asset: $_" }
          }
          Get-Content dist/SHA256SUMS | ForEach-Object {
            $expected, $name = $_ -split '  ', 2
            $actual = (Get-FileHash "dist/$name" -Algorithm SHA256).Hash.ToLower()
            if ($expected -ne $actual) { throw "Packaged asset checksum mismatch: $name" }
          }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dlss-updater-release-assets
          path: |
            dist/dlss-updater.exe
            dist/SHA256SUMS
            dist/dlss-updater-windows-x86_64.zip
          if-no-files-found: error

  publish:
    name: Attest and publish
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Create the GitHub release and upload assets.
      id-token: write # Obtain the OIDC identity used for provenance.
      attestations: write # Publish build provenance for the release assets.
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dlss-updater-release-assets
          path: dist
      - name: Verify release assets
        run: test -f dist/dlss-updater.exe && test -f dist/SHA256SUMS && test -f dist/dlss-updater-windows-x86_64.zip
      - name: Attest release provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/dlss-updater.exe
            dist/dlss-updater-windows-x86_64.zip
            dist/SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/dlss-updater.exe
          dist/dlss-updater-windows-x86_64.zip
          dist/SHA256SUMS
          --verify-tag
          --generate-notes
          --title "$GITHUB_REF_NAME"
